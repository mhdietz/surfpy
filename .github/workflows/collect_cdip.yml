name: Collect CDIP Data

on:
  # Weekly run — Sunday at 02:30 UTC, alongside NDBC collection.
  # CDIP realtime buoys report on a ~30min cadence but the fetcher pulls a
  # multi-day window each run, so weekly collection loses nothing.
  schedule:
    - cron: '30 2 * * 0'

  # Manual trigger for testing or backfill
  workflow_dispatch:
    inputs:
      spot:
        description: 'Spot name to collect (leave blank for all CDIP spots)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: evaluation/requirements.txt

      - name: Install dependencies
        run: pip install -r evaluation/requirements.txt

      - name: Run CDIP collection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd evaluation
          SPOT="${{ github.event.inputs.spot }}"
          if [ -n "$SPOT" ]; then
            echo "--- Collecting $SPOT ---"
            python fetch/cdip.py "$SPOT"
          else
            echo "--- Collecting all CDIP spots ---"
            python fetch/cdip.py
          fi

      - name: Summary
        if: always()
        run: |
          SPOT="${{ github.event.inputs.spot }}"
          if [ -n "$SPOT" ]; then
            echo "CDIP collection complete for $SPOT"
          else
            echo "CDIP collection complete for all spots"
          fi
