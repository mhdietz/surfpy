name: Email Weekly Report

on:
  # Monday 4pm UTC — 11am EST (winter) / 12pm EDT (summer)
  # NDBC collection runs Sunday 2am UTC, so data is ~38 hours fresh by send time.
  schedule:
    - cron: '0 16 * * 1'

  # Manual trigger for testing
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: evaluation/requirements.txt

      - name: Install dependencies
        run: pip install -r evaluation/requirements.txt

      - name: Generate report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd evaluation
          python evaluate.py

      - name: Send report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd evaluation
          python send_report.py

      - name: Summary
        if: always()
        run: echo "Weekly report workflow complete"
