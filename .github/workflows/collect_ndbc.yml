name: Collect NDBC Data

on:
  # Weekly run — Sunday at 02:00 UTC (Saturday evening US time)
  # NDBC realtime2 serves ~45 days, so weekly collection loses nothing.
  schedule:
    - cron: '0 2 * * 0'

  # Manual trigger for testing or backfill
  workflow_dispatch:
    inputs:
      spot:
        description: 'Spot name to collect (leave blank for all spots)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: evaluation/requirements.txt

      - name: Install dependencies
        run: pip install -r evaluation/requirements.txt

      - name: Run NDBC collection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd evaluation
          SPOT="${{ github.event.inputs.spot }}"
          if [ -n "$SPOT" ]; then
            echo "--- Collecting $SPOT ---"
            python fetch/ndbc.py "$SPOT"
          else
            echo "--- Collecting all spots ---"
            python fetch/ndbc.py
          fi

      - name: Summary
        if: always()
        run: |
          SPOT="${{ github.event.inputs.spot }}"
          if [ -n "$SPOT" ]; then
            echo "NDBC collection complete for $SPOT"
          else
            echo "NDBC collection complete for all spots"
          fi
